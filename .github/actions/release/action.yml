name: "Build & push image (release.sh)"
description: >
  Build the calling repo's Dockerfile and push tagged images to the Scaleway
  registry using infra.lux/scripts/release.sh. Tag scheme: see infra.lux/README.md.
  The calling workflow must check itself out with fetch-depth: 0 (release.sh needs
  full history + tags for `git describe`).

inputs:
  image:
    description: "Image name, e.g. server-encoder"
    required: true
  postfix:
    description: "Extra immutable tag (workflow_dispatch builds only)"
    required: false
    default: ""
  registry:
    description: "Registry host"
    required: false
    default: "rg.fr-par.scw.cloud"
  namespace:
    description: "Registry namespace"
    required: false
    default: "upskiller"
  scw-registry-user:
    description: "Registry login user"
    required: false
    default: "nologin"
  scw-secret-key:
    description: "Scaleway secret key for registry login + push"
    required: true
  platform:
    description: "Build platform"
    required: false
    default: "linux/amd64"

runs:
  using: composite
  steps:
    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Scaleway registry
      shell: bash
      run: |
        echo "${{ inputs.scw-secret-key }}" \
          | docker login "${{ inputs.registry }}" -u "${{ inputs.scw-registry-user }}" --password-stdin

    - name: Build & push (release.sh)
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        IMAGE: ${{ inputs.image }}
        REGISTRY: ${{ inputs.registry }}
        NAMESPACE: ${{ inputs.namespace }}
        PLATFORM: ${{ inputs.platform }}
      run: |
        args=(--push)
        [[ -n "${{ inputs.postfix }}" ]] && args+=(--postfix "${{ inputs.postfix }}")
        # release.sh lives at the infra.lux repo root (action is at .github/actions/release).
        bash "${{ github.action_path }}/../../../scripts/release.sh" "${args[@]}"
